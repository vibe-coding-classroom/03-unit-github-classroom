name: GitHub Classroom Autograding
on: [push]
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        id: run-tests
        run: npm test
      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        env:
          ANY_TEST_RESULTS: ${{steps.run-tests.outputs.result}}
        with:
          runners: run-tests
